<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Symptom Daily Note</title>
    <style>
         :root {--primary-color: #FF5A7A; --bg: #FEF1F6;} body.preg-mode{--primary-color: #5AA1FF; --bg:#F1F8FE;} *{box-sizing: border-box; -webkit-tap-highlight-color: transparent;}
         body { margin:0; padding:40px 20px 120px 20px; background:var(--bg); font-family:'SF Pro Display', -apple-system, sans-serif;}
         h2{font-size:28px; color:#222; letter-spacing: -0.5px; margin-top:0;} 
         .lgGrD { display:flex; flex-wrap:wrap; gap:12px; margin: 15px 0 35px 0;}
         .gpxItem { background: #fff; padding:15px 22px; border-radius:20px; font-weight:700; font-size:15px; border:2px solid #EAEAEA; cursor:pointer; color:#666; box-shadow: 0 5px 15px rgba(0,0,0,0.02); transition:0.3s cubic-bezier(0.4, 0, 0.2, 1);}
         .gpxItem.xcL { background:var(--primary-color); border-color:var(--primary-color); color:#fff; transform:translateY(-3px); box-shadow:0 10px 25px rgba(255, 90, 122, 0.4);}
         .sbmNxKbtn { width:100%; padding:20px; border:none; border-radius: 25px; font-weight: 800; color:white; font-size: 16px; margin-top:20px; transition:0.3s; cursor:pointer; box-shadow: 0 10px 30px rgba(255, 90, 122, 0.3);} .sbmNxKbtn:active{transform: scale(0.97);}
         .rBgKnxM { background:linear-gradient(135deg, var(--primary-color), #FF7696); }
         body.preg-mode .gpxItem.xcL {background:var(--primary-color); box-shadow:0 8px 25px rgba(90, 161, 255, 0.4);}
         body.preg-mode .rBgKnxM {background:linear-gradient(135deg, #5AA1FF, #76CEFF); box-shadow: 0 10px 30px rgba(90, 161, 255, 0.3);}
         .succModxx { position:fixed; display:none; inset:0; align-items:center; justify-content:center; background:rgba(0, 0, 0,0.6); backdrop-filter:blur(10px); z-index:99999; text-align:center; animation: fade 0.3s;} 
         .mNxxbxIck { background:#fff; width: 85%; max-width: 350px; padding:40px 30px; border-radius:40px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); transform: scale(0.9); animation: popIn 0.4s forwards cubic-bezier(0.3, 1.5, 0.4, 1);} 
         .xnxK { font-size:55px; margin-bottom: 10px; display:inline-block; background: #FEF1F6; width: 100px; height: 100px; line-height: 100px; border-radius: 50%;}
         .navv { position:fixed; bottom: 20px; left: 20px; right: 20px; height: 75px; display:flex; justify-content:space-around; align-items:center; background:rgba(255,255,255,0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index:9999; border-radius: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.5);}
         .icnn { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; width: 60px; height: 100%; cursor: pointer;}
         .icnn svg { width:26px; height:26px; stroke:#B0AFB5; fill:none; stroke-width:2.2; stroke-linecap: round; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);}
         .icnn.act svg { stroke:var(--primary-color); transform: translateY(-3px) scale(1.1);}
         .icnn.center-btn { transform: translateY(-20px); background: linear-gradient(135deg, var(--primary-color), #FF7696); width: 65px; height: 65px; border-radius: 50%; box-shadow: 0 10px 25px rgba(255, 90, 122, 0.4); border: 4px solid #FEF1F6;}
         .icnn.center-btn svg { stroke: #fff; width: 28px; height: 28px;}
         body.preg-mode .icnn.center-btn { background: linear-gradient(135deg, #5AA1FF, #76CEFF); box-shadow: 0 10px 25px rgba(90, 161, 255, 0.4); border-color: #F1F8FE;}
         @keyframes fade {from {opacity:0} to {opacity:1}}
         @keyframes popIn {to {transform: scale(1)}}
    </style>
</head>
<body>
    <h2 data-en="Daily Health Track 🤍" data-hi="आज आप कैसा महसूस कर रही हैं? 🤍"></h2>
    
    <div style="font-weight:800; margin-top:30px; color:#444; font-size:15px;" data-en="🩸 Menstruation bleeding flow" data-hi="🩸 खून का बहाव कितना (Flow volume)?">Flow Type</div>
    <div class="lgGrD">
        <div class="gpxItem" onclick="tkNxAxcC(this)" data-hi="नॉर्मल / हल्का" data-en="Normal/Mild">Normal/Mild</div>
        <div class="gpxItem" onclick="tkNxAxcC(this)" data-hi="बहुत भारी (Heavy)" data-en="Heavy Rush">Heavy Rush</div>
        <div class="gpxItem" onclick="tkNxAxcC(this)" data-hi="सिर्फ धब्बे (Spotting)" data-en="Spotting Only">Spotting Only</div>
    </div>

    <div style="font-weight:800; color:#444; font-size:15px;" data-en="🥺 Physical pain points" data-hi="🥺 आपके शरीर में कहां दर्द हो रहा है?">Symptoms Signs</div>
    <div class="lgGrD">
        <div class="gpxItem chck-symp" data-type="cramp" onclick="tkNxAxcC(this)" data-hi="पेट में ऐंठन (Cramps) ⚡" data-en="Stomach Cramps ⚡">Stomach Cramps ⚡</div>
        <div class="gpxItem chck-symp" data-type="back" onclick="tkNxAxcC(this)" data-hi="कमर / लोअर बैक दर्द" data-en="Lower Back Pain">Lower Back Pain</div>
        <div class="gpxItem" onclick="tkNxAxcC(this)" data-hi="भारीपन महसूस होना 🎈" data-en="Heaviness / Bloated 🎈">Heaviness / Bloated 🎈</div>
        <div class="gpxItem" onclick="tkNxAxcC(this)" data-hi="सिरदर्द / थकावट 🤕" data-en="Headache / Stress 🤕">Headache / Stress 🤕</div>
    </div>
    
    <div style="font-weight:800; color:#444; font-size:15px;" data-hi="🎭 आपका मूड कैसा है?" data-en="🎭 Emotional state">Mind state</div>
    <div class="lgGrD">
        <div class="gpxItem chck-symp" data-type="sad" onclick="tkNxAxcC(this)" data-hi="रोना आ रहा है 😔" data-en="Feeling Sad/Crying 😔">Feeling Sad/Crying 😔</div>
        <div class="gpxItem" onclick="tkNxAxcC(this)" data-hi="चिड़चिड़ापन (Annoyed) 😡" data-en="Easily Annoyed 😡">Easily Annoyed 😡</div>
        <div class="gpxItem" onclick="tkNxAxcC(this)" data-hi="रिलैक्स और खुश 😇" data-en="Relaxed & Happy 😇">Relaxed & Happy 😇</div>
        <div class="gpxItem" onclick="tkNxAxcC(this)" data-hi="बहुत कमज़ोरी लग रही 😴" data-en="Extreme Fatigue 😴">Extreme Fatigue 😴</div>
    </div>

    <button class="sbmNxKbtn rBgKnxM" onclick="xLogKkkMsxC(this)" data-en="SAVE TODAY'S NOTE 🗃️" data-hi="अपनी हेल्थ डायरी में सेव करें 🗃️"></button>

    <div class="succModxx" id="succPxMnGkQc">
        <div class="mNxxbxIck">
           <div class="xnxK">🌿</div>
           <h2 data-en="Saved Beautifully!" data-hi="सेव हो गया!" style="margin: 0 0 10px; color:#222;"></h2>
           <p style="font-weight:700; color:#666; font-size: 16px; line-height: 1.5;" id="dynamicRemedyMsg" data-en="Your body is doing a lot of hard work. Keep a hot water bag ready and take some rest ✨" data-hi="आपका शरीर हिम्मत का रूप है। थोड़ा आराम करें और गर्म चाय या पानी पिएं। हम आपके साथ हैं! ✨"></p>
        </div>
    </div>

    <div class="navv">
         <a onclick="location.href='index.html'" class="icnn"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></a>
         <a onclick="location.href='calendar.html'" class="icnn"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></a>
         <a onclick="location.href='symptoms.html'" class="icnn center-btn act"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></a>
         <a onclick="location.href='tools.html'" class="icnn"><svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg></a>
         <a onclick="location.href='settings.html'" class="icnn"><svg viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line></svg></a>
    </div>

    <script>
        let mnCfg = JSON.parse(localStorage.getItem('appConfig'))||{lang:'hi', pregMode:false, alerts:{period:true, water:true, love:true}};
        let amData = JSON.parse(localStorage.getItem('userData'));
        if(!mnCfg.alerts) mnCfg.alerts = {period:true, water:true, love:true};
        if(mnCfg.pregMode) document.body.classList.add('preg-mode');

        // --- 🧠 SMART JAVA SYNC ---
        function syncWithAndroid() {
            if (!window.Android || !window.Android.scheduleSmartAlarm || !amData) return;
            try {
                let wtState = JSON.parse(localStorage.getItem('waterLog')) || { count: 0 };
                let freq = localStorage.getItem('lastFreqKey') || "DAILY";
                if(localStorage.getItem('masterToglStatus') === "NO") freq = "OFF";
                window.Android.scheduleSmartAlarm(
                    amData.lastDate, amData.cycleLength.toString(), freq, 
                    mnCfg.lang, amData.name || "Beautiful", wtState.count,
                    mnCfg.alerts.period, mnCfg.alerts.water, mnCfg.alerts.love
                );
            } catch(e) {}
        }

        document.querySelectorAll('[data-'+mnCfg.lang+']').forEach(a=>{ a.innerText = a.getAttribute('data-'+mnCfg.lang); });
        function tkNxAxcC(vxE){ vxE.classList.toggle('xcL'); }

        function xLogKkkMsxC(xcMkcxqBc1C){
             let hasCramp = document.querySelector('.chck-symp[data-type="cramp"]').classList.contains('xcL');
             let hasSad = document.querySelector('.chck-symp[data-type="sad"]').classList.contains('xcL');
             let msgBx = document.getElementById('dynamicRemedyMsg');
             if(hasCramp) msgBx.innerText = mnCfg.lang=='hi' ? "पेट दर्द के लिए कृपया हीटिंग पैड का उपयोग करें और थोड़ा गुनगुना पानी पिएं। हम आपके साथ हैं! 🌸" : "Please use a heating pad for cramps and drink warm water. You are strong! 🌸";
             else if(hasSad) msgBx.innerText = mnCfg.lang=='hi' ? "रोना आए तो रो लें, यह मन हल्का करता है। आप बहुत प्यारी और मजबूत हैं! 💖" : "It's okay to cry, let it out. You are beautiful and so strong! 💖";
             else msgBx.innerText = mnCfg.lang=='hi' ? "आपका शरीर हिम्मत का रूप है। थोड़ा आराम करें और गर्म चाय या पानी पिएं। ✨" : "Your body is doing a lot of hard work. Take some rest ✨";

             document.getElementById('succPxMnGkQc').style.display = "flex";
             syncWithAndroid(); 
             setTimeout(()=> { document.getElementById('succPxMnGkQc').style.display="none"; }, 4500); 
        }

        window.onload = () => { syncWithAndroid(); }
    </script>
</body>
</html>
