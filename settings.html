<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Config Center</title>
    <style>
         :root {--primary-color: #FF5A7A; --bg: #FEF1F6;} body.preg-mode{--primary-color: #5AA1FF; --bg:#F1F8FE;} *{box-sizing: border-box; -webkit-tap-highlight-color: transparent;}
         body { margin:0; padding:20px 0 120px 0; background:var(--bg); font-family:'SF Pro Display', -apple-system, sans-serif; transition: background 0.5s ease; overflow-x: hidden;}
         
         /* Decorative Blobs */
         .bg-blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.5; z-index: -1; }
         .blob-1 { width: 200px; height: 200px; background: var(--primary-color); top: -50px; left: -50px; animation: float-blob 8s infinite alternate ease-in-out, pulse-blob 6s infinite alternate; }
         .blob-2 { width: 250px; height: 250px; background: #FFD1E3; bottom: 100px; right: -50px; animation: float-blob 10s infinite alternate-reverse ease-in-out, pulse-blob 7s infinite alternate; animation-delay: -3s; }
         @keyframes float-blob { 0% { transform: translateY(0) scale(1) rotate(0deg); } 100% { transform: translateY(40px) scale(1.15) rotate(15deg); } }
         @keyframes pulse-blob { 0% { opacity: 0.4; filter: blur(60px); } 100% { opacity: 0.7; filter: blur(40px); } }
         @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }

         .crd {background:rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.6); margin:0 20px 20px; padding:25px; border-radius:30px; box-shadow:0 12px 35px rgba(255, 90, 122, 0.05); position:relative; animation: slideUpFade 0.8s both;}
         .crd:nth-of-type(1) { animation-delay: 0.1s; }
         .crd:nth-of-type(2) { animation-delay: 0.2s; }
         .crd:nth-of-type(3) { animation-delay: 0.3s; }

         select { width:100%; padding:16px 20px; border-radius:18px; background:#F8F9FA; border:1.5px solid #EAEAEA; outline:none; font-size:15px; font-weight:700; color:#333; appearance: none; transition: 0.3s;}
         select:focus { border-color: var(--primary-color); background: #fff;}
         label { font-size: 14px; color: #666; display:block; margin-bottom: 8px; font-weight: 700; letter-spacing: 0.3px;}
         h2 {text-align:center; color:#222; margin:10px 0 25px; font-size: 24px; animation: slideUpFade 0.8s both;}
         
         .navv { position:fixed; bottom: 20px; left: 20px; right: 20px; height: 75px; display:flex; justify-content:space-around; align-items:center; background:rgba(255,255,255,0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index:9999; border-radius: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.5);}
         .icnn { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; width: 60px; height: 100%; cursor: pointer;}
         .icnn svg { width:26px; height:26px; stroke:#B0AFB5; fill:none; stroke-width:2.2; stroke-linecap: round; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);}
         .icnn.act svg { stroke:var(--primary-color); transform: translateY(-3px) scale(1.1);}
         .icnn.center-btn { transform: translateY(-20px); background: linear-gradient(135deg, var(--primary-color), #FF7696); width: 65px; height: 65px; border-radius: 50%; box-shadow: 0 10px 25px rgba(255, 90, 122, 0.4); border: 4px solid var(--bg); transition: 0.3s;}
         .icnn.center-btn:hover { transform: translateY(-23px) scale(1.05); }
         .icnn.center-btn svg { stroke: #fff; width: 28px; height: 28px;}
         body.preg-mode .icnn.center-btn { background: linear-gradient(135deg, #5AA1FF, #76CEFF); box-shadow: 0 10px 25px rgba(90, 161, 255, 0.4); border-color: #F1F8FE;}
         
         .switch-line {display:flex; justify-content:space-between; align-items:center; margin-top:15px; border-top:1px dashed #EAEAEA; padding-top:15px;}
         .tgld input { display:none;} .slider { width:46px; height:24px; border-radius:24px; background:#E0E0E0; position:relative; transition:0.3s; cursor:pointer;} .slider:before{content:"";position:absolute; width:18px;height:18px;border-radius:50%; background:#fff; top:3px;left:3px; transition:0.4s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: 0 2px 5px rgba(0,0,0,0.1);} .tgld input:checked + .slider {background: #1CC489;} .tgld input:checked + .slider:before{transform:translateX(22px);} 
         .btnx {width:100%; background:linear-gradient(135deg, var(--primary-color), #FF7696); padding:18px; border-radius:20px; color:white; font-size:16px; font-weight:800; border:none; transition:0.3s; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 90, 122, 0.3);} .btnx:active { transform: scale(0.97); box-shadow: 0 4px 10px rgba(255, 90, 122, 0.2);}
         body.preg-mode .btnx {background: linear-gradient(135deg, #5AA1FF, #76CEFF); box-shadow: 0 8px 20px rgba(90, 161, 255, 0.3);}
         .act-pop { position:fixed; z-index:99999; top:0; left:0; right:0; bottom:0; display:none; flex-direction:column; justify-content:center; align-items:center; background:rgba(0,0,0,0.5); backdrop-filter: blur(5px); animation:inop 0.4s; }
         .act-card { background:#fff; width:85%; max-width:340px; padding:35px 30px; text-align:center; border-radius:40px; transform:scale(0.8); transition:0.4s cubic-bezier(0.3,1.5,0.4,1); box-shadow: 0 20px 50px rgba(0,0,0,0.15);} .act-pop.op {display:flex;} .act-pop.op .act-card{transform:scale(1);}
         .ckm { width:80px; height:80px; background:linear-gradient(135deg, #1CC489, #2CD99E); border-radius:50%; margin: 0 auto 20px; display:flex; align-items:center; justify-content:center; box-shadow: 0 10px 20px rgba(28, 196, 137, 0.3); }
         .ckm svg {width:45px; height:45px; fill:none; stroke:#fff; stroke-width:4; stroke-linecap:round; stroke-linejoin:round;}
         @keyframes inop {from{opacity:0;}to{opacity:1;}}
         .sub-text {font-size:12px; color:#888; font-weight:600; margin-top:4px;}

         /* Mascot Styles */
         .mascot-container { position: fixed; bottom: 110px; right: 15px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; pointer-events: auto; }
         .mascot-doll { font-size: 65px; animation: float-doll 3s infinite alternate ease-in-out; filter: drop-shadow(0 10px 15px rgba(255, 90, 122, 0.4)); transform-origin: bottom center; background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, transparent 60%); border-radius: 50%; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; margin-right: 5px; cursor: pointer; user-select: none; transition: transform 0.2s; }
         .mascot-doll:active { transform: scale(0.9); }
         .mascot-speech { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 12px 18px; border-radius: 20px 20px 0 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); font-size: 14px; font-weight: 800; color: var(--primary-color); margin-bottom: 5px; max-width: 220px; text-align: right; border: 2px solid var(--primary-color); display: none; transform-origin: bottom right; }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <!-- CUTE MASCOT DOLL -->
    <div id="mascot-container" class="mascot-container">
        <div id="mascot-speech" class="mascot-speech">अपने हिसाब से सब सेट कर लो मेरी प्यारी! ⚙️🌸</div>
        <div id="mascot-doll" class="mascot-doll" onclick="pokeDoll()">🧚‍♀️</div>
    </div>

    <div id="fullLoader"><h2 id="lTextH1" data-hi="सेटिंग्स ⚙️" data-en="Settings ⚙️">Settings ⚙️</h2></div>
    
    <div class="crd">
         <label data-en="Application Language" data-hi="ऐप की भाषा"></label>
         <select id="uxLangPref" onchange="runTranslateAppLine(this.value)">
             <option value="en">English (Global) 🌍</option>
             <option value="hi">हिंदी (मातृभाषा) 🌸</option>
         </select>
    </div>

    <!-- 🚀 ULTRA POWERFUL NOTIFICATION ENGINE PANEL -->
    <div class="crd" style="box-shadow:0 0 0 2px rgba(28,196,137,0.3), 0 15px 35px rgba(28,196,137,0.1)">
         <label style="color:#1CC489; font-size: 16px; display:flex; align-items:center; gap:8px;" data-hi="स्मार्ट हेल्थ अलर्ट सिस्टम ✨" data-en="Smart Health Alerts ✨"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg> स्मार्ट अलर्ट्स</label>
         
         <div class="switch-line" style="border:none; padding-top:10px;">
            <span style="font-weight:800; font-size:16px; color:#333;" data-en="Main Alert System" data-hi="मुख्य अलर्ट चालू रखें"></span>
            
            <!-- 🔥 ONCLICK PAR RETURN FALSE WALA TRICK (Hilega Hi Nahi Bina Permission Ke) 🔥 -->
            <label class="tgld"><input type="checkbox" id="toglPushSet" onclick="return checkPermBeforeToggle(this)" onchange="toggleSubOptions()"><div class="slider"></div></label>
         </div>

         <!-- 🚀 NEW PREMIUM TOGGLES -->
         <div id="subOpts" style="background: #F8FCFA; border-radius: 20px; padding: 10px 15px; margin-top: 10px; border: 1px solid #D5F5E3; transition: 0.3s;">
             <div class="switch-line" style="border:none; padding-top:5px;">
                <div>
                    <span style="font-weight:700; font-size:14px; color:#333;" data-hi="🩸 पीरियड और डेट अलर्ट" data-en="🩸 Period & Ovulation Alerts"></span>
                    <div class="sub-text" data-hi="डेट्स और क्रैम्प्स का रिमाइंडर" data-en="Reminders for upcoming dates"></div>
                </div>
                <label class="tgld"><input type="checkbox" id="prefPeriod" onchange="reactToSetting('period')"><div class="slider"></div></label>
             </div>
             <div class="switch-line">
                <div>
                    <span style="font-weight:700; font-size:14px; color:#333;" data-hi="💧 पानी और हाइड्रेशन" data-en="💧 Hydration Reminders"></span>
                    <div class="sub-text" data-hi="दिनभर में पानी पीने की याद दिलाएं" data-en="Track and remind water intake"></div>
                </div>
                <label class="tgld"><input type="checkbox" id="prefWater" onchange="reactToSetting('water')"><div class="slider"></div></label>
             </div>
             <div class="switch-line">
                <div>
                    <span style="font-weight:700; font-size:14px; color:#333;" data-hi="✨ लव और मोटिवेशन" data-en="✨ Daily Motivation"></span>
                    <div class="sub-text" data-hi="मूड अच्छा रखने के लिए प्यारे मैसेज" data-en="Sweet messages to boost mood"></div>
                </div>
                <label class="tgld"><input type="checkbox" id="prefLove" onchange="reactToSetting('love')"><div class="slider"></div></label>
             </div>
         </div>

         <label style="margin-top:20px;" data-hi="अलर्ट कितनी बार चाहिए?" data-en="Alert Frequency Level"></label>
         <select id="tAlertMode" style="border:2px solid #1CC489; background: #fff; color: #108E61;">
             <option value="DAILY">रोजाना एक बार (Daily) 🌅</option>
             <option value="EVERY_1_HR">हर 1 घंटे में याद दिलाएं ⏰</option>
             <option value="EVERY_3_HR">हर 3 घंटे में अलर्ट 🔔</option>
             <option value="EVERY_4_HR">हर 4 घंटे में अलर्ट ⏳</option>
             <option value="EVERY_5_HR">हर 5 घंटे में अलर्ट ⌛</option>
             <option value="15_SEC_TEST">सिर्फ टेस्टिंग के लिए (15 Seconds) 🚀</option>
         </select>
         
         <button class="btnx" onclick="invokeSystemCommitPush()" style="margin-top:20px; display:flex; gap:10px; justify-content:center; align-items:center;">
             <svg width="22" height="22" fill="white" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> 
             <span data-en="Save Alarm Configuration" data-hi="अलार्म सेटिंग्स सेव करें"></span>
         </button>

         <div style="margin-top: 25px; border-top:1px dashed #EAEAEA; padding-top:20px; text-align:center;">
             <p style="font-size: 13px; color:#888; font-weight:600; line-height:1.5; margin-bottom: 15px;" data-hi="आपके नाम और पसंद के साथ लाइव टेस्टिंग करें।" data-en="Run a live test push with your preferences."></p>
             <button onclick="pingHardPush()" class="btnx" style="background:#222; box-shadow: 0 8px 20px rgba(0,0,0,0.2); padding: 14px;" data-en="Trigger Live Test Alarm 📱" data-hi="लाइव टेस्टिंग अलार्म भेजें 📱"></button>
         </div>
    </div>

    <div class="crd">
         <div class="switch-line" style="margin-top:0; padding:0; border:none; margin-bottom:5px;">
             <div>
                  <span style="font-weight:800; font-size:16px; color:#333; display:flex; align-items:center; gap:8px;" data-hi="👼 प्रेगनेंसी मोड" data-en="👼 Pregnancy Mode">👼 Pregnancy Mode</span>
                  <div style="font-size:12px; color:var(--primary-color); font-weight:600; margin-top: 4px;" data-en="Transforms UI for baby tracking." data-hi="ऐप को प्रेगनेंसी ट्रैकर में बदलें"></div>
             </div>
             <label class="tgld"><input type="checkbox" id="mDSwitchPg" onchange="runSaveFutureSys(this.checked)"><div class="slider"></div></label>
         </div>
    </div>

    <div class="act-pop" id="actMdck">
        <div class="act-card">
            <div class="ckm"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
            <h3 id="aTxkNm" style="font-size: 24px; color:#222; margin:0 0 10px;">Successfully Set</h3>
            <p style="font-weight:600; font-size:15px; color:#666; line-height:1.5; margin:0;" id="aTxkBm">Set Hogaya hai...</p>
        </div>
    </div>

    <div class="navv">
         <a onclick="location.href='index.html'" class="icnn"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></a>
         <a onclick="location.href='calendar.html'" class="icnn"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></a>
         <a onclick="location.href='symptoms.html'" class="icnn center-btn"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></a>
         <a onclick="location.href='tools.html'" class="icnn"><svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg></a>
         <a onclick="location.href='settings.html'" class="icnn act"><svg viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line></svg></a>
    </div>

    <script>
        const amData = JSON.parse(localStorage.getItem('userData'));
        
        let configBase = JSON.parse(localStorage.getItem('appConfig')) || { lang: 'hi', pregMode:false, alerts:{period:false, water:false, love:false} };
        if(!configBase.alerts) configBase.alerts = {period:false, water:false, love:false};

        // Mascot Helper Functions
        function pokeDoll(text) {
            let mSpeech = document.getElementById('mascot-speech');
            if(text) mSpeech.innerText = text;
            else mSpeech.innerText = configBase.lang=='hi' ? "सेटिंग्स बदलना ज़रूरी है! ⚙️" : "Adjust settings to your liking! ⚙️";
            
            if(mSpeech) {
                 if(navigator.vibrate) navigator.vibrate(50);
                 mSpeech.style.display = 'block';
                 mSpeech.style.animation = 'none';
                 setTimeout(() => { mSpeech.style.animation = 'speech-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards'; }, 10);
                 setTimeout(() => { mSpeech.style.animation = 'fadeOut 0.5s forwards'; }, 5000);
            }
        }
        function reactToSetting(type) {
            if(type === 'water') pokeDoll(configBase.lang=='hi'?"अब मैं तुम्हें पानी पीने की याद दिलाऊंगी! 💧":"I'll make sure you stay hydrated! 💧");
            if(type === 'love') pokeDoll(configBase.lang=='hi'?"तुम्हें रोज़ प्यारे मैसेजेस मिलेंगे! 🥰":"I'll send you daily sweet words! 🥰");
            if(type === 'period') pokeDoll(configBase.lang=='hi'?"डेट्स की टेंशन मुझ पर छोड़ दो! 📅":"Leave the dates tension to me! 📅");
        }

        function bootOps() {
             document.getElementById('uxLangPref').value = configBase.lang;
             if(configBase.pregMode) { document.getElementById('mDSwitchPg').checked = true; document.body.classList.add('preg-mode'); document.getElementById('mascot-doll').innerText="👼"; }
             
             document.getElementById('toglPushSet').checked = localStorage.getItem('masterToglStatus') === "YES"; 
             
             document.getElementById('prefPeriod').checked = configBase.alerts.period;
             document.getElementById('prefWater').checked = configBase.alerts.water;
             document.getElementById('prefLove').checked = configBase.alerts.love;
             
             document.getElementById('tAlertMode').value = localStorage.getItem('lastFreqKey') || "DAILY";
             
             let chk = document.getElementById('toglPushSet').checked;
             document.getElementById('subOpts').style.opacity = chk ? "1" : "0.4";
             document.getElementById('subOpts').style.pointerEvents = chk ? "auto" : "none";

             transTxt();
             setTimeout(()=>pokeDoll(), 1000);
        }

        function runTranslateAppLine(valX){ configBase.lang=valX; localStorage.setItem('appConfig', JSON.stringify(configBase)); location.reload();}
        function runSaveFutureSys(vx) { configBase.pregMode=vx; localStorage.setItem('appConfig', JSON.stringify(configBase)); location.reload(); }
        function transTxt(){ document.querySelectorAll('[data-'+configBase.lang+']').forEach(a=>{ a.innerText = a.getAttribute('data-'+configBase.lang);}); }
        
        // 🚀 BULLETPROOF PERMISSION LOCK 
        function checkPermBeforeToggle(checkbox) {
            if (checkbox.checked) { // Agar ON karne ki koshish hui
                if (typeof window.Android !== 'undefined') {
                    try {
                        if (!window.Android.hasNotificationPermission()) {
                            window.Android.askForSmartPermissions(); // Java ko invoke karega
                            pokeDoll(configBase.lang=='hi'?"अलर्ट के लिए पहले सेटिंग्स में परमिशन ऑन करें! 🙏":"Enable permissions first! 🙏");
                            return false; // 🔥 ISSE TOGGLE VISUALLY HILEGA BHI NAHI
                        }
                    } catch(e) {}
                } else if ("Notification" in window) {
                    if (Notification.permission !== "granted") {
                        Notification.requestPermission().then(function(p) {
                            if (p === "granted") {
                                checkbox.checked = true;
                                toggleSubOptions(); // Permission milte hi khud ON kardo
                            }
                        });
                        pokeDoll(configBase.lang=='hi'?"परमिशन दें! 🙏":"Enable permissions! 🙏");
                        return false; // 🔥 ISSE TOGGLE VISUALLY HILEGA BHI NAHI
                    }
                }
            }
            return true; // Agar ON hai aur OFF kar raha hai, ya permission hai toh pass
        }

        function toggleSubOptions() {
            let chk = document.getElementById('toglPushSet').checked;
            if(chk) { proceedEnable(); } 
            else { proceedDisable(); }
        }

        function proceedEnable() {
            document.getElementById('subOpts').style.opacity = "1";
            document.getElementById('subOpts').style.pointerEvents = "auto";
            pokeDoll(configBase.lang=='hi'?"अलर्ट चालू कर दिए! अब अपनी पसंद सेट करो... 🔔":"Alerts ON! Choose your preferences... 🔔");
        }

        function proceedDisable() {
            document.getElementById('subOpts').style.opacity = "0.4";
            document.getElementById('subOpts').style.pointerEvents = "none";
            pokeDoll(configBase.lang=='hi'?"अरे! तुमने मेरे नोटिफिकेशन्स बंद कर दिए 🥺":"Oh no! You muted me 🥺");
        }

        // --- 🧠 SMART JAVA SYNC ---
        function syncWithAndroid(isOkeyStatus, remIdexLox) {
            if (!window.Android || !window.Android.scheduleSmartAlarm || !amData) return;
            try {
                let wtState = JSON.parse(localStorage.getItem('waterLog')) || { count: 0 };
                window.Android.scheduleSmartAlarm(
                    amData.lastDate, amData.cycleLength.toString(), isOkeyStatus ? remIdexLox : "OFF", 
                    configBase.lang, amData.name || "Beautiful", wtState.count,
                    configBase.alerts.period, configBase.alerts.water, configBase.alerts.love
                );
            } catch(e) {}
        }

        function invokeSystemCommitPush() {
             let isOkeyStatus = document.getElementById('toglPushSet').checked; 
             
             if (isOkeyStatus && typeof window.Android !== 'undefined') {
                 try {
                     if (!window.Android.hasNotificationPermission()) {
                         document.getElementById('toglPushSet').checked = false; 
                         proceedDisable();
                         window.Android.askForSmartPermissions();
                         pokeDoll(configBase.lang=='hi'?"परमिशन ऑन करें! 🙏":"Please enable permissions! 🙏");
                         return; 
                     }
                 } catch(e){}
             }

             if(!amData){ alert("कृपया पहले होम पेज पर अपना प्रोफाइल बनाएं!"); location.href="index.html"; return; }
             
             let remIdexLox = document.getElementById('tAlertMode').value; 
             
             configBase.alerts.period = document.getElementById('prefPeriod').checked;
             configBase.alerts.water = document.getElementById('prefWater').checked;
             configBase.alerts.love = document.getElementById('prefLove').checked;

             localStorage.setItem('masterToglStatus', isOkeyStatus ? "YES" : "NO");
             localStorage.setItem('lastFreqKey', remIdexLox); 
             localStorage.setItem('appConfig', JSON.stringify(configBase));

             syncWithAndroid(isOkeyStatus, remIdexLox); 

             pokeDoll(configBase.lang=='hi'?"सेटिंग्स एकदम परफेक्ट हैं! 🌸":"Settings look perfect now! 🌸");

             const nmA = (amData.name || "Beautiful");
             document.getElementById('aTxkNm').innerText = isOkeyStatus ? `Done, ${nmA}! 💖` : `Alerts OFF`;
             let cxXn = isOkeyStatus ? `अलार्म सेट हो गए हैं। आपके चुने हुए ऑप्शन्स आपको याद दिलाए जाएंगे!` : `आपके नोटिफिकेशन्स बंद कर दिए गए हैं। ✔`;
             if(configBase.lang=='en') cxXn = isOkeyStatus ? `Smart alarms updated successfully!` : 'Notifications securely turned off.';

             document.getElementById('aTxkBm').innerText = cxXn;
             document.getElementById('actMdck').classList.add('op'); 
             setTimeout(()=> { document.getElementById('actMdck').classList.remove('op');}, 3500);
        }

        function pingHardPush() {
             if(!amData) return;
             try{ if(window.Android && window.Android.testNotificationNow) window.Android.testNotificationNow(amData.name, configBase.lang=='hi'?"टेस्ट सफल रहा! आपका स्मार्ट अलर्ट सिस्टम बिल्कुल परफेक्ट काम कर रहा है। 🌸":"Test successful! Your smart alert system is perfectly active. 🌸"); }catch(dce){}
             
             document.getElementById('aTxkNm').innerText = "Testing... 🚀";
             document.getElementById('aTxkBm').innerText = configBase.lang=='hi' ? `प्रिय ${amData.name}, आपको तुरंत एक टेस्ट अलार्म मिलेगा!` : `Direct User: ${amData.name}, test alarm triggered!`;
             document.getElementById('actMdck').classList.add('op'); 
             setTimeout(()=>document.getElementById('actMdck').classList.remove('op'), 2500);
        }

        document.addEventListener('DOMContentLoaded', bootOps);
    </script>
</body>
</html>
